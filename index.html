<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Eminence Printing | Premium Printing & Signage in South Africa</title>
    <meta
      name="description"
      content="Eminence Printing is South Africa's trusted print partner. We offer flyers, banners, business cards, vehicle branding, signage, and more — with fast 72-hour turnaround and nationwide delivery."
    />
    <meta name="author" content="Eminence Printing" />
    <meta
      name="keywords"
      content="printing South Africa, banner printing Johannesburg, flyers printing SA, business cards printing, vehicle branding, signage solutions, Eminence Printing"
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#00b4b6" />

    <!-- Canonical -->
    <link rel="canonical" href="https://eminenceprinting.co.za" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://eminenceprinting.co.za" />
    <meta
      property="og:title"
      content="Eminence Printing | Premium Printing & Signage in South Africa"
    />
    <meta
      property="og:description"
      content="Elevate your brand with premium print solutions. Fast turnaround, exceptional quality, nationwide delivery across South Africa."
    />
    <meta property="og:image" content="https://eminenceprinting.co.za/social-preview.png" />
    <meta property="og:locale" content="en_ZA" />
    <meta property="og:site_name" content="Eminence Printing" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://eminenceprinting.co.za" />
    <meta
      name="twitter:title"
      content="Eminence Printing | Premium Printing & Signage in South Africa"
    />
    <meta
      name="twitter:description"
      content="Elevate your brand with premium print solutions. Fast turnaround, exceptional quality, nationwide delivery across South Africa."
    />
    <meta name="twitter:image" content="https://eminenceprinting.co.za/social-preview.png" />

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Eminence Printing",
        "description": "Premium printing and signage company based in Johannesburg, South Africa.",
        "url": "https://eminenceprinting.co.za",
        "telephone": "+27123456789",
        "email": "hello@eminenceprinting.co.za",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "123 Print Avenue",
          "addressLocality": "Johannesburg",
          "addressCountry": "ZA"
        },
        "priceRange": "$$",
        "openingHours": "Mo-Fr 08:00-17:00"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
